<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLAN — Payment Successful</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  background: #f7f8fa;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #111;
}

.card {
  width: 100%;
  max-width: 760px;
  background: white;
  border-radius: 28px;
  padding: 56px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.04);
  text-align: center;
}

.icon {
  font-size: 70px;
  margin-bottom: 20px;
}

.title {
  font-size: 40px;
  font-weight: 800;
  margin-bottom: 16px;
}

.subtitle {
  color: #666;
  font-size: 18px;
  line-height: 1.7;
  margin-bottom: 42px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.box {
  background: #fafafa;
  border-radius: 18px;
  padding: 24px;
}

.label {
  font-size: 14px;
  color: #777;
}

.value {
  font-size: 24px;
  font-weight: 700;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  background: #111;
  color: white;
  padding: 16px 30px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="card">

<div class="icon">
✅
</div>

<div class="title">
Subscription Activated
</div>

<div class="subtitle">
Your payment was successful.<br>
Your AI Revenue Engine is now active and ready for deployment.
</div>

<div class="grid">

<div class="box">
  <div class="label">Account Status</div>
  <div class="value">Active</div>
</div>

<div class="box">
  <div class="label">Billing Cycle</div>
  <div class="value">Monthly</div>
</div>

<div class="box">
  <div class="label">Dashboard Access</div>
  <div class="value">Ready</div>
</div>

</div>

<button class="btn" onclick="goDashboard()">
Open Dashboard
</button>

</div>

<script>
function goDashboard() {
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
