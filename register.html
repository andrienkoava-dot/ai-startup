<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLAN — Create Account</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  background: #f7f8fa;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #111;
}

.container {
  width: 100%;
  max-width: 500px;
  background: white;
  border-radius: 24px;
  padding: 48px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.04);
}

.logo {
  font-size: 28px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 10px;
}

.title {
  font-size: 34px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 12px;
}

.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 30px;
  line-height: 1.6;
}

.input {
  width: 100%;
  padding: 16px;
  border: 1px solid #ddd;
  border-radius: 14px;
  margin-bottom: 16px;
  font-size: 15px;
}

.btn {
  width: 100%;
  background: #111;
  color: white;
  border: none;
  padding: 16px;
  border-radius: 14px;
  font-size: 15px;
  cursor: pointer;
  margin-top: 8px;
}

.btn-light {
  background: #f1f1f1;
  color: #111;
}

.footer {
  margin-top: 24px;
  text-align: center;
  color: #666;
  font-size: 14px;
}

.link {
  color: #111;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>
<body>

<script>
const existingClient = localStorage.getItem("clientEmail");

if (existingClient) {
  window.location.href = "/dashboard.html";
}
</script>

<div class="container">

<div class="logo">
VLAN
</div>

<div class="title">
Create Your Account
</div>

<div class="subtitle">
Launch your AI Revenue Engine,<br>
activate billing and start scaling revenue
</div>

<input
  id="name"
  class="input"
  type="text"
  placeholder="Full Name"
/>

<input
  id="email"
  class="input"
  type="email"
  placeholder="Business Email"
/>

<input
  id="password"
  class="input"
  type="password"
  placeholder="Password"
/>

<button class="btn" onclick="register()">
Create Account
</button>

<button class="btn btn-light" onclick="goLogin()">
Already Have Account
</button>

<div class="footer">
GDPR compliant • Secure billing • Enterprise ready
</div>

</div>

<script>
function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!name || !email || !password) {
    alert("Please complete all fields");
    return;
  }

  localStorage.setItem("clientName", name);
  localStorage.setItem("clientEmail", email);

  window.location.href = "/checkout.html";
}

function goLogin() {
  window.location.href = "/login.html";
}
</script>

</body>
</html>
